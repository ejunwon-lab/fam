<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>가족 일정</title>
<meta name="theme-color" content="#171a20">
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://script.googleusercontent.com">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  :root {
    color-scheme: dark;
    --bg: #171a20; --ink: #e8ebf0; --sub: #98a2b1;
    --card: #21252d; --line: #2e343e;
    --etc-bg: #262b33; --etc-ink: #b6bec9;
    --indigo: #8b96f2; --indigo-soft: #262b45;
    --teal: #4fc0af; --teal-soft: #16302b;
    --amber: #e3a94f; --amber-soft: #382e1a;
    --success: #4cc27e; --danger: #e07070;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Apple SD Gothic Neo", system-ui, -apple-system, "Segoe UI", sans-serif;
    line-height: 1.5;
  }
  .screen { max-width: 480px; margin: 0 auto; padding: 14px 18px 118px; }

  .tabbar {
    position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    width: min(calc(100% - 56px), 400px); z-index: 4;
    display: flex; align-items: center; gap: 4px; padding: 7px; border-radius: 99px;
    background: rgba(33, 37, 45, .88); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--line); box-shadow: 0 8px 28px rgba(0, 0, 0, .45);
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 9px 4px;
    border: none; background: none; color: var(--sub); font: inherit; cursor: pointer;
    border-radius: 99px; transition: background .18s ease, color .18s ease;
  }
  .tab.on { background: var(--indigo); color: #14171c; }
  .tab .ti { font-size: 17px; line-height: 1; }
  .tab .tl { font-size: 10.5px; font-weight: 700; line-height: 1; }

  .appbar { display: flex; justify-content: space-between; align-items: center; padding: 8px 2px 14px; }
  .appbar .t { font-size: 21px; font-weight: 800; }
  .appbar .right { display: flex; align-items: center; gap: 8px; }
  .appbar .who {
    font-size: 13px; font-weight: 700; color: var(--indigo);
    background: var(--indigo-soft); border: none; font-family: inherit;
    border-radius: 99px; padding: 6px 12px; cursor: pointer;
  }
  .iconbtn {
    width: 32px; height: 32px; border-radius: 11px; padding: 0;
    background: var(--card); border: 1px solid var(--line);
    font-size: 15px; cursor: pointer; display: grid; place-items: center;
  }
  .back { background: none; border: none; color: var(--sub); font: inherit; font-size: 15px; font-weight: 700; cursor: pointer; padding: 4px 2px; }

  .practice-cta {
    width: 100%; text-align: left; cursor: pointer; font: inherit; color: #06231e;
    background: linear-gradient(135deg, #5fd3bf, #4fc0af);
    border: none; border-radius: 22px; padding: 18px 20px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 15px;
  }
  .practice-cta .ic { font-size: 30px; }
  .practice-cta .big { font-size: 18px; font-weight: 800; }
  .practice-cta .small { font-size: 12.5px; font-weight: 600; opacity: .82; }

  .sec-label { font-size: 12px; font-weight: 700; letter-spacing: .08em; color: var(--sub); margin: 14px 2px 8px; }

  .presets { display: flex; flex-direction: column; gap: 10px; }
  .preset {
    display: flex; align-items: center; gap: 14px; width: 100%; text-align: left;
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 16px; font: inherit; color: inherit; cursor: pointer; transition: transform .08s ease;
  }
  .preset:active { transform: scale(.98); }
  .preset:focus-visible, .chip:focus-visible, .cta:focus-visible, .etc:focus-visible, .pick:focus-visible, .tbtn:focus-visible {
    outline: 2px solid var(--indigo); outline-offset: 2px;
  }
  .preset .dot {
    width: 44px; height: 44px; border-radius: 14px; flex: none;
    display: grid; place-items: center; font-size: 19px; font-weight: 800;
  }
  .preset[data-hue="indigo"] .dot { background: var(--indigo-soft); color: var(--indigo); }
  .preset[data-hue="teal"]   .dot { background: var(--teal-soft);   color: var(--teal); }
  .preset[data-hue="amber"]  .dot { background: var(--amber-soft);  color: var(--amber); }
  .preset .name { font-size: 17.5px; font-weight: 700; flex: 1; }
  .preset .cnt { font-size: 12.5px; color: var(--sub); font-variant-numeric: tabular-nums; }
  .preset .cnt.full { color: var(--success); font-weight: 700; }

  .etc {
    width: 100%; margin-top: 10px; background: var(--etc-bg);
    border: 1.5px dashed var(--line); border-radius: 18px; padding: 14px;
    font: inherit; font-size: 15.5px; font-weight: 600; color: var(--etc-ink); cursor: pointer;
  }

  .others { margin-top: 18px; }
  .others-toggle {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    background: none; border: none; font: inherit; color: var(--sub);
    font-size: 13.5px; font-weight: 700; padding: 8px 2px; cursor: pointer;
  }
  .others-toggle .arr { transition: transform .15s ease; }
  .others.on .others-toggle .arr { transform: rotate(90deg); }
  .others-body { display: none; }
  .others.on .others-body { display: block; }
  .o-group { margin: 8px 0 4px; font-size: 12px; font-weight: 700; color: var(--sub); }
  .o-preset {
    display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 11px 14px; font: inherit; color: inherit; cursor: pointer; margin-bottom: 7px;
  }
  .o-preset .o-name { font-size: 15px; font-weight: 600; flex: 1; }
  .o-preset .o-tag { font-size: 11.5px; color: var(--sub); }

  .recent { display: flex; flex-direction: column; gap: 8px; }
  .recent .row {
    display: flex; justify-content: space-between; gap: 10px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 13px; padding: 10px 14px; font-size: 13.5px;
  }
  .recent .r-t { font-weight: 600; }
  .recent .r-d { color: var(--sub); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .empty { color: var(--sub); font-size: 13.5px; padding: 6px 2px; }

  /* 타이머 */
  .timer-wrap { text-align: center; padding-top: 8px; }
  .state-pill { display: inline-block; font-size: 13px; font-weight: 800; letter-spacing: .04em; padding: 6px 16px; border-radius: 99px; margin-bottom: 20px; }
  .state-idle { background: var(--card); color: var(--sub); border: 1px solid var(--line); }
  .state-practice { background: var(--teal-soft); color: var(--teal); }
  .state-break { background: var(--amber-soft); color: var(--amber); }
  .dial {
    width: 220px; height: 220px; border-radius: 50%; margin: 0 auto 8px;
    display: grid; place-items: center; border: 8px solid var(--line); transition: border-color .3s ease;
  }
  .dial.practice { border-color: var(--teal); box-shadow: 0 0 40px -12px var(--teal); }
  .dial.break { border-color: var(--amber); box-shadow: 0 0 40px -12px var(--amber); }
  .dial .clock { font-size: 46px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .dial .clabel { font-size: 12.5px; color: var(--sub); margin-top: 2px; font-weight: 700; }
  .kind-chips { display: flex; gap: 7px; justify-content: center; margin: 14px 0 6px; }
  .kchip { font: inherit; font-size: 13px; font-weight: 700; border: 1px solid var(--line); background: var(--card); color: var(--sub); border-radius: 99px; padding: 7px 14px; cursor: pointer; }
  .kchip.on { background: var(--indigo); border-color: var(--indigo); color: #14171c; }
  .totals { display: flex; justify-content: center; gap: 26px; margin: 18px 0 24px; }
  .totals .tt { font-size: 12px; color: var(--sub); font-weight: 700; }
  .totals .tv { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .totals .practice .tv { color: var(--teal); }
  .totals .brk .tv { color: var(--amber); }
  .tbtns { display: flex; flex-direction: column; gap: 11px; padding: 0 4px; }
  .tbtn { font: inherit; font-size: 18px; font-weight: 800; border: none; border-radius: 18px; padding: 18px; cursor: pointer; }
  .tbtn.start, .tbtn.resume { background: var(--teal); color: #06231e; }
  .tbtn.rest { background: var(--amber); color: #2a1e06; }
  .tbtn.stop { background: none; border: 1.5px solid var(--line); color: var(--sub); font-size: 16px; padding: 15px; }
  .tbtn:disabled { opacity: .6; }
  .tbtn:active { filter: brightness(.93); }
  .hint { font-size: 12.5px; color: var(--sub); margin-top: 16px; }

  /* ── 열품타 메인(연습) 화면 ── */
  .yp-top { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 2px 6px; }
  .yp-date { font-size: 19px; font-weight: 800; letter-spacing: -.01em; }
  .yp-total { font-size: 19px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .yp-goal { font-size: 12px; color: var(--sub); font-weight: 700; text-align: right; margin: -2px 2px 8px; font-variant-numeric: tabular-nums; }
  .yp-dday { display: inline-block; font-size: 11.5px; font-weight: 800; background: var(--indigo-soft); color: var(--indigo); border-radius: 99px; padding: 3px 10px; margin-bottom: 6px; }
  .yp-body { display: flex; gap: 4px; align-items: flex-start; }
  .yp-left { flex: 1 1 55%; min-width: 0; padding-right: 8px; }
  .yp-right { flex: 0 0 43%; }
  .yp-subj { margin-bottom: 2px; }
  .yp-sh { display: flex; align-items: center; gap: 9px; padding: 9px 2px 7px; cursor: pointer; background: none; border: none; width: 100%; font: inherit; color: inherit; text-align: left; }
  .yp-sh:active { opacity: .6; }
  .yp-cbar { width: 4px; height: 17px; border-radius: 2px; flex: none; }
  .yp-nm { font-size: 16px; font-weight: 800; flex: 1; }
  .yp-tm { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .yp-todo { display: flex; align-items: center; gap: 10px; padding: 7px 2px 7px 4px; cursor: pointer; }
  .yp-ring { width: 21px; height: 21px; border-radius: 50%; border: 2px solid; flex: none; display: grid; place-items: center; font-size: 11px; color: transparent; }
  .yp-todo.done .yp-ring { color: #06231e; }
  .yp-tx { font-size: 14px; flex: 1; }
  .yp-todo.done .yp-tx { color: var(--faint); text-decoration: line-through; }
  .yp-rep { font-size: 10px; font-weight: 800; color: var(--amber); background: var(--amber-soft); border-radius: 99px; padding: 2px 7px; }
  .yp-add { display: flex; align-items: center; gap: 9px; padding: 12px 2px 6px; color: var(--sub); font-size: 14.5px; font-weight: 600; cursor: pointer; background: none; border: none; font-family: inherit; }
  .yp-add .p { width: 25px; height: 25px; border-radius: 50%; border: 1.5px solid var(--line); display: grid; place-items: center; font-size: 15px; }
  .yp-div { height: 1px; background: var(--line); margin: 5px 0 6px; }
  .mtt { position: relative; }
  .mtt-row { display: flex; align-items: flex-start; height: 26px; }
  .mtt-hr { width: 20px; flex: none; font-size: 10.5px; color: var(--faint); font-variant-numeric: tabular-nums; line-height: 1; transform: translateY(-5px); }
  .mtt-cell { flex: 1; height: 100%; border-top: 1px solid var(--line); border-left: 1px solid var(--line); }
  .mtt-row:last-child .mtt-cell { border-bottom: 1px solid var(--line); }
  .mtt-blocks { position: absolute; left: 20px; right: 0; top: 0; bottom: 0; }
  .mtt-blk { position: absolute; left: 2px; right: 2px; border-radius: 3px; }

  /* ── 열품타 통계 ── */
  .yp-pills { display: flex; gap: 7px; margin: 4px 0 14px; overflow-x: auto; }
  .yp-pill { font: inherit; font-size: 13.5px; font-weight: 700; border: 1px solid var(--line); background: none; color: var(--sub); border-radius: 99px; padding: 8px 16px; cursor: pointer; white-space: nowrap; }
  .yp-pill.on { background: var(--indigo); border-color: var(--indigo); color: #14171c; }
  .yp-scard { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px 16px; margin-bottom: 12px; }
  .cal-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 12px; }
  .cal-nav .mo { font-size: 16px; font-weight: 800; }
  .cal-nav button { background: none; border: none; color: var(--sub); font-size: 17px; cursor: pointer; padding: 2px 8px; }
  .cal-nav button:disabled { opacity: .3; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { text-align: center; font-size: 10.5px; color: var(--faint); font-weight: 700; padding-bottom: 2px; }
  .cal-cell { aspect-ratio: .8; border-radius: 7px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; cursor: pointer; }
  .cal-cell .cd { font-size: 11px; font-weight: 700; }
  .cal-cell .ct { font-size: 8px; font-variant-numeric: tabular-nums; opacity: .9; }
  .cal-cell.empty { visibility: hidden; cursor: default; }
  .cal-cell.sel { outline: 2px solid var(--ink); }
  .cal-legend { display: flex; align-items: center; gap: 4px; margin-top: 12px; font-size: 10px; color: var(--faint); }
  .cal-legend .lc { width: 15px; height: 12px; border-radius: 3px; }
  .cal-tot { text-align: right; font-size: 11px; color: var(--sub); margin-top: 8px; font-variant-numeric: tabular-nums; }
  .dtl-h { text-align: center; font-size: 15px; font-weight: 800; margin-bottom: 14px; }
  .dtl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px 10px; }
  .dtl .dl { font-size: 12px; font-weight: 700; color: var(--indigo); margin-bottom: 3px; }
  .dtl .dv { font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .scard-t { font-size: 14px; font-weight: 800; margin-bottom: 14px; }
  .donut2 { display: flex; align-items: center; gap: 18px; }
  .donut2 .d { width: 104px; height: 104px; border-radius: 50%; flex: none; display: grid; place-items: center; }
  .donut2 .dh { width: 58px; height: 58px; border-radius: 50%; background: var(--card); display: grid; place-items: center; font-size: 13px; font-weight: 800; }
  .donut2 .lg { flex: 1; display: flex; flex-direction: column; gap: 9px; }
  .donut2 .lgi { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .donut2 .dt { width: 10px; height: 10px; border-radius: 3px; flex: none; }
  .donut2 .dn { font-weight: 700; flex: 1; }
  .donut2 .dv { color: var(--sub); font-size: 12px; font-variant-numeric: tabular-nums; }
  .stack { display: flex; align-items: flex-end; gap: 7px; height: 128px; padding-top: 6px; }
  .stack-col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; gap: 3px; }
  .stack-bars { width: 62%; display: flex; flex-direction: column-reverse; border-radius: 4px 4px 0 0; overflow: hidden; min-height: 2px; }
  .stack-seg { width: 100%; }
  .stack-lb { font-size: 9px; color: var(--faint); font-variant-numeric: tabular-nums; }
  .trend { display: flex; align-items: flex-end; gap: 5px; height: 116px; }
  .trend-col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; gap: 4px; }
  .trend-bar { width: 66%; background: var(--indigo); border-radius: 3px 3px 0 0; min-height: 2px; }
  .trend-lb { font-size: 8.5px; color: var(--faint); }
  .rep-toggle { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; font-size: 14.5px; font-weight: 600; }
  .tg { width: 46px; height: 27px; border-radius: 99px; background: var(--line); position: relative; cursor: pointer; transition: background .18s; flex: none; }
  .tg.on { background: var(--teal); }
  .tg::after { content: ''; position: absolute; top: 3px; left: 3px; width: 21px; height: 21px; border-radius: 50%; background: #fff; transition: transform .18s; }
  .tg.on::after { transform: translateX(19px); }
  .tsheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 6; max-width: 480px; margin: 0 auto; background: var(--card); border-radius: 26px 26px 0 0; padding: 10px 20px calc(26px + env(safe-area-inset-bottom)); transform: translateY(108%); transition: transform .24s ease; box-shadow: 0 -8px 30px rgba(10,14,20,.4); }
  body.todo-open .tsheet { transform: translateY(0); }
  body.todo-open .backdrop { opacity: 1; pointer-events: auto; }
  .tsheet h2 { margin: 0 0 4px; font-size: 19px; }
  .tsheet input { width: 100%; font: inherit; font-size: 16px; font-weight: 600; background: var(--bg); color: inherit; border: 1px solid var(--line); border-radius: 12px; padding: 11px 12px; }
  .colordot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
  .colordot.on { border-color: var(--ink); box-shadow: 0 0 0 2px var(--card), 0 0 0 4px var(--ink); }

  /* 연습 홈 (열품타식) */
  .dday-pill {
    display: inline-block; font-size: 12.5px; font-weight: 800; letter-spacing: .03em;
    background: var(--indigo-soft); color: var(--indigo); border-radius: 99px; padding: 5px 14px; margin-bottom: 12px;
  }
  .p-hero { text-align: center; padding: 6px 0 18px; }
  .ring {
    width: 218px; height: 218px; border-radius: 50%; margin: 0 auto;
    background: conic-gradient(var(--teal) calc(var(--p) * 1%), var(--line) 0);
    display: grid; place-items: center;
  }
  .ring-in {
    width: 194px; height: 194px; border-radius: 50%; background: var(--bg);
    display: grid; place-items: center;
  }
  .p-clock { font-size: 40px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: .01em; }
  .p-goal { font-size: 12.5px; color: var(--sub); font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .running-banner {
    width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--teal-soft); border: 1px solid var(--teal); color: var(--teal);
    border-radius: 16px; padding: 14px 16px; font: inherit; font-size: 15px; font-weight: 800;
    cursor: pointer; margin-bottom: 14px; font-variant-numeric: tabular-nums;
  }
  .kind-rows { display: flex; flex-direction: column; gap: 10px; }
  .kind-row {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 16px; font: inherit; color: inherit; cursor: pointer; transition: transform .08s ease;
  }
  .kind-row:active { transform: scale(.98); }
  .kind-row .kr-play {
    width: 40px; height: 40px; border-radius: 50%; flex: none;
    background: var(--teal-soft); color: var(--teal);
    display: grid; place-items: center; font-size: 15px;
  }
  .kind-row .kr-name { font-size: 17px; font-weight: 700; flex: 1; }
  .kind-row .kr-time { font-size: 14px; color: var(--sub); font-variant-numeric: tabular-nums; font-weight: 700; }

  /* 측정 화면 (몰입 · 검정) */
  .measure {
    position: fixed; inset: 0; z-index: 20; background: #08090c;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px 22px calc(30px + env(safe-area-inset-bottom));
  }
  body.measuring .measure { display: flex; }
  .m-collapse {
    position: absolute; top: 14px; right: 16px;
    background: none; border: 1px solid #23262e; color: #6b7688;
    border-radius: 12px; font: inherit; font-size: 13px; font-weight: 700;
    padding: 8px 14px; cursor: pointer;
  }
  .m-kind { font-size: 15px; font-weight: 800; color: #98a2b1; margin-bottom: 10px; }
  .m-pill { display: inline-block; font-size: 13px; font-weight: 800; padding: 6px 16px; border-radius: 99px; margin-bottom: 26px; }
  .m-pill.practice { background: var(--teal-soft); color: var(--teal); }
  .m-pill.break { background: var(--amber-soft); color: var(--amber); }
  .m-clock { font-size: 72px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: .01em; line-height: 1; }
  .m-clock.practice { color: #e8ebf0; }
  .m-clock.break { color: var(--amber); }
  .m-today { font-size: 14px; color: #6b7688; font-weight: 700; margin-top: 14px; font-variant-numeric: tabular-nums; }
  .m-btns { display: flex; flex-direction: column; gap: 11px; width: 100%; max-width: 340px; margin-top: 44px; }

  /* 잔디 · 타임테이블 · 주간 */
  .grass-head, .grass-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .grass-head { margin-bottom: 5px; }
  .grass-head span { text-align: center; font-size: 10.5px; font-weight: 700; color: var(--sub); }
  .g-cell {
    aspect-ratio: 1; border-radius: 7px; background: var(--card); border: 1px solid var(--line);
    display: grid; place-items: center; font-size: 10.5px; font-weight: 700; color: var(--sub);
    cursor: pointer; padding: 0; font-variant-numeric: tabular-nums;
  }
  .g-cell.empty { background: none; border: none; cursor: default; }
  .g-cell.g1 { background: #1c3330; border-color: #235148; }
  .g-cell.g2 { background: #1f5a4e; border-color: #27705f; color: #bfe9df; }

  .summary .close { margin-top: auto; background: var(--indigo); color: #14171c; border: none; border-radius: 16px; font: inherit; font-size: 17px; font-weight: 800; padding: 16px; cursor: pointer; }

  .toast { position: fixed; left: 18px; right: 18px; top: 16px; z-index: 9; max-width: 444px; margin: 0 auto; background: var(--success); color: #14171c; border-radius: 14px; padding: 13px 16px; font-size: 14.5px; font-weight: 700; opacity: 0; transform: translateY(-12px); transition: opacity .2s ease, transform .2s ease; pointer-events: none; box-shadow: 0 8px 24px rgba(10,14,20,.25); }

  .guide .retry { margin-top: 10px; background: var(--indigo); color: #14171c; border: none; border-radius: 12px; font: inherit; font-size: 15px; font-weight: 700; padding: 11px 20px; cursor: pointer; }
  .picker { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
  .pick { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 18px; font: inherit; font-size: 18px; font-weight: 700; color: var(--ink); cursor: pointer; text-align: center; }
  .loading { text-align: center; color: var(--sub); padding: 80px 0; font-size: 15px; }
  .spin { width: 28px; height: 28px; margin: 0 auto 14px; border: 3px solid var(--line); border-top-color: var(--indigo); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .kakao { margin: 4px 0 14px; background: var(--amber-soft); border: 1px solid var(--amber); border-radius: 16px; padding: 16px; }
  .kakao h2 { margin: 0 0 6px; font-size: 16.5px; color: var(--amber); }
  .kakao p { margin: 0 0 10px; font-size: 13.5px; color: var(--ink); }
  .kakao .go { width: 100%; background: var(--amber); color: #1c1508; border: none; border-radius: 12px; font: inherit; font-size: 15.5px; font-weight: 800; padding: 13px; cursor: pointer; }

  @media (prefers-reduced-motion: reduce) { .sheet, .backdrop, .toast, .preset, .spin, .summary, .dial { transition: none; animation: none; } }

<body>
  <div class="screen" id="app"><div class="loading"><div class="spin"></div>불러오는 중…</div></div>

  <div class="tabbar" id="tabbar" style="display:none"></div>

  <div class="toast" id="toast"></div>
  <div class="backdrop" id="backdrop"></div>

  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <h2 id="shTitle"></h2>
    <p class="sub" id="shSub"></p>
    <input type="text" id="shCustom" placeholder="일정 이름 입력" style="display:none">

    <div class="f-label">날짜 · 시작</div>

    <div class="f-label">얼마나 하나요?</div>
    <div class="chips" id="durChips"></div>
    <div class="dt-row" id="endRow" style="display:none; margin-top:8px"><input type="time" id="shEnd" aria-label="끝나는 시간"></div>
    <div class="endline" id="endline"></div>
    <button class="cta" id="ctaBtn">가족 캘린더에 등록</button>
  </div>

  <div class="tsheet" id="todoSheet"></div>

  <div class="measure" id="measure"></div>

  <div class="summary" id="summary"></div>

<script>
  var API = 'https://script.google.com/macros/s/AKfycbxCMHMAE-br_i_MuSG7kQx-Jk6RZW-bqSQVBEorqXo0_EIa0BmujdHZJCNb_n0sSvU4lA/exec';
  var HUES = ['indigo', 'teal', 'amber'];
  var DURS = [30, 60, 90, 120];
  var SKEY = 'famsession';

  var BOOT = null, view = 'home';
  var cur = null, curDur = 60, customEnd = false, sending = false, othersOpen = false;
  // 타이머
  var sess = null, tick = null, overlayOpen = false, wakeLock = null;
  function subjNames() { return ((BOOT && BOOT.subjects) || []).map(function (s) { return s.name; }); }
  function subjColor(name) { var l = (BOOT && BOOT.subjects) || []; for (var i = 0; i < l.length; i++) if (l[i].name === name) return l[i].color || '#9aa4b2'; return '#9aa4b2'; }
  var COLOR_PALETTE = ['#4fc0af', '#8b96f2', '#e3a94f', '#e07070', '#5fb0e0', '#c78bf2', '#7cc36a', '#e8a13c'];
  // 통계
  var statsOff = 0, statsData = null, statsLoading = false, statsTarget = '', statsSelDay = 0, statsMode = '일간';
  var CAL_COLS = ['#191c22', '#26264a', '#3a3f8f', '#5a63c8', '#8b96f2'];

  function $(id) { return document.getElementById(id); }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function store(k, v) { try { if (v === null) localStorage.removeItem(k); else localStorage.setItem(k, v); } catch (e) {} }
  function read(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
  function myCode() {
    var q = new URLSearchParams(location.search).get('u');
    if (q) { store('famcode', q); return q; }
    return read('famcode') || '';
  }

  function loadSess() {
    try { var s = JSON.parse(read(SKEY) || 'null'); return (s && (s.state === 'practice' || s.state === 'break')) ? s : null; } catch (e) { return null; }
  }
  function saveSess() { store(SKEY, sess ? JSON.stringify(sess) : null); }

  function bootKey(code) { return 'bootcache:' + code; }
  function saveBoot(data) {
    if (data && data.member) store(bootKey(data.member.code), JSON.stringify(data));
  }

  function init() {
    var code = myCode();
    sess = loadSess();
    if (sess) overlayOpen = true; // 측정 중이던 세션은 측정 화면으로 복귀
    // 캐시 우선: 지난 데이터로 즉시 그리고, 최신은 뒤에서 받아 갱신 (앱 시작 체감 0초)
    var cached = null;
    if (code) { try { cached = JSON.parse(read(bootKey(code)) || 'null'); } catch (e) {} }
    if (cached && cached.member) {
      BOOT = cached;
      view = sess ? 'timer' : (cached.member.practice ? 'timer' : 'home');
      render();
    } else {
      $('app').innerHTML = '<div class="loading"><div class="spin"></div>불러오는 중…</div>';
    }
    fetch(API + '?api=init&u=' + encodeURIComponent(code))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        BOOT = data;
        saveBoot(data);
        if (!cached) view = (sess || (data.member && data.member.practice)) ? 'timer' : 'home';
        // 사용자가 시트·요약을 보는 중이면 화면은 두고 데이터만 갱신
        if (!document.body.classList.contains('open') && !document.body.classList.contains('summary-on') && view !== 'stats') {
          render();
        } else {
          renderTabs();
        }
      })
      .catch(function () {
        if (cached) return; // 캐시로 이미 떠 있으면 조용히 넘어감 — 다음 등록 때 재시도
        $('app').innerHTML = '<div class="guide"><h2>연결이 안 돼요</h2><p>인터넷 연결을 확인하고 다시 시도해주세요.</p><button class="retry" id="retryBtn">다시 시도</button></div>';
        $('retryBtn').addEventListener('click', init);
      });
  }

  function renderTabs() {
    var bar = $('tabbar');
    if (!BOOT || BOOT.error || !BOOT.member) { bar.style.display = 'none'; return; }
    var tabs = [];
    tabs.push({ k: 'home', i: '📝', l: '일정 등록' });
    if (BOOT.member.practice) tabs.push({ k: 'timer', i: '🎸', l: '연습' });
    tabs.push({ k: 'stats', i: '📊', l: '통계' });
    bar.style.display = 'flex';
    bar.innerHTML = tabs.map(function (t) {
      return '<button class="tab' + (view === t.k ? ' on' : '') + '" data-k="' + t.k + '"><span class="ti">' + t.i + '</span><span class="tl">' + t.l + '</span></button>';
    }).join('');
    var btns = bar.querySelectorAll('.tab');
    for (var i = 0; i < btns.length; i++) (function (b) {
      b.addEventListener('click', function () {
        var k = b.getAttribute('data-k');
        if (k === view) return;
        view = k;
        if (k === 'stats') { statsOff = 0; statsTarget = ''; statsData = null; loadStats(); }
        else render();
      });
    })(btns[i]);
  }

  function render() {
    renderTabs();
    if (BOOT && BOOT.error) {
      $('app').innerHTML = '<div class="guide"><h2>준비가 안 됐어요</h2><p>' + esc(BOOT.error) + '</p><button class="retry" id="retryBtn">다시 시도</button></div>';
      $('retryBtn').addEventListener('click', init); return;
    }
    if (!BOOT.member) return renderPicker();
    if (view === 'timer' && !BOOT.member.practice) view = 'home';
    if (view !== 'timer') stopTick();
    if (view === 'timer') return renderTimer();
    if (view === 'stats') return renderStats();
    return renderHome();
  }

  function renderPicker() {
    var h = '<div class="appbar"><span class="t">누구세요?</span></div><div class="sec-label">이름을 누르면 이 폰에 기억돼요</div><div class="picker">';
    (BOOT.members || []).forEach(function (m) { h += '<button class="pick" data-code="' + esc(m.code) + '">' + esc(m.name) + '</button>'; });
    h += '</div>';
    $('app').innerHTML = h;
    var picks = $('app').querySelectorAll('.pick');
    for (var i = 0; i < picks.length; i++) (function (b) {
      b.addEventListener('click', function () { store('famcode', b.getAttribute('data-code')); init(); });
    })(picks[i]);
  }

  function renderHome() {
    var isKakao = /KAKAOTALK/i.test(navigator.userAgent);
    var h = '';
    if (isKakao) {
      h += '<div class="kakao"><h2>카카오톡 안에서는 설치가 안 돼요</h2><p>아래 버튼으로 브라우저에서 연 다음, 홈 화면에 추가해주세요.<br>iPhone: 사파리 공유버튼 → <b>홈 화면에 추가</b> · Android: 크롬 메뉴 ⋮ → <b>홈 화면에 추가</b></p><button class="go" id="kakaoGo">브라우저로 열기</button></div>';
    }
    h += '<div class="appbar"><span class="t">일정 기록</span><div class="right">' +
      '<button class="iconbtn" id="calBtn" title="가족 캘린더 열기" aria-label="가족 캘린더 열기">📅</button>' +
      '<button class="who" id="whoBtn" title="이름 바꾸기">' + esc(BOOT.member.name) + '</button></div></div>';
    h += '<div class="sec-label">탭 한 번으로 등록</div><div class="presets">';
    // 이름이 'X (변주)' 꼴인 프리셋은 X로 묶어 버튼 1개 → 시트 안에서 변주(칩) 선택
    var items = [], gmap = {};
    BOOT.presets.forEach(function (p) {
      var mm = /^(.+?)\s*\((.+)\)$/.exec(p.name);
      if (mm) {
        var base = mm[1].replace(/\s+$/, ''), variant = mm[2].trim();
        if (!gmap[base]) { gmap[base] = { type: 'group', name: base, variants: [] }; items.push(gmap[base]); }
        gmap[base].variants.push({ p: p, variant: variant });
      } else items.push({ type: 'single', p: p });
    });
    items = items.map(function (it) {
      return (it.type === 'group' && it.variants.length === 1) ? { type: 'single', p: it.variants[0].p } : it;
    });
    items.forEach(function (it, gi) {
      var hue = HUES[gi % HUES.length];
      if (it.type === 'group') {
        h += '<button class="preset" data-hue="' + hue + '" data-g="' + gi + '"><span class="dot">' + esc(it.name.charAt(0)) + '</span><span class="name">' + esc(it.name) + '</span><span class="cnt"></span></button>';
        return;
      }
      var p = it.p, full, cntLabel;
      if (p.tQuota > 0) {
        full = p.tCnt >= p.tQuota;
        cntLabel = '누적 ' + p.tCnt + '/' + p.tQuota + '회' + (full ? ' ✓' : '');
      } else {
        full = p.quota > 0 && p.cnt >= p.quota;
        cntLabel = '이달 ' + p.cnt + (p.quota > 0 ? '/' + p.quota : '') + '회' + (full ? ' ✓' : '');
      }
      h += '<button class="preset" data-hue="' + hue + '" data-g="' + gi + '"><span class="dot">' + esc(p.name.charAt(0)) + '</span><span class="name">' + esc(p.name) + '</span><span class="cnt' + (full ? ' full' : '') + '">' + cntLabel + '</span></button>';
    });
    h += '</div><button class="etc" id="etcBtn">기타 일정 (직접 입력)</button>';
    var others = BOOT.others || [];
    if (others.length) {
      var groups = {};
      others.forEach(function (o, i) { (groups[o.whoName] = groups[o.whoName] || []).push(i); });
      h += '<div class="others' + (othersOpen ? ' on' : '') + '" id="others"><button class="others-toggle" id="othersToggle"><span>가족 일정 대신 올리기 (' + others.length + ')</span><span class="arr">▸</span></button><div class="others-body">';
      Object.keys(groups).forEach(function (wn) {
        h += '<div class="o-group">' + esc(wn) + '</div>';
        groups[wn].forEach(function (i) {
          var o = others[i];
          h += '<button class="o-preset" data-oi="' + i + '"><span class="o-name">' + esc(o.name) + '</span><span class="o-tag">' + esc(o.whoName) + ' 일정으로 등록</span></button>';
        });
      });
      h += '</div></div>';
    }
    h += '<div class="sec-label">최근 기록</div><div class="recent">';
    if (BOOT.recent.length) BOOT.recent.forEach(function (r) { h += '<div class="row"><span class="r-t">' + esc(r.t) + '</span><span class="r-d">' + esc(r.d) + '</span></div>'; });
    else h += '<div class="empty">아직 기록이 없어요. 첫 일정을 올려보세요!</div>';
    h += '</div>';
    var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (!isKakao && !standalone && read('installHintOff') !== '1') {
      h += '<div class="install" id="installHint"><button class="x" id="installX" aria-label="닫기">✕</button><div class="i-t">홈 화면에 추가하면 앱처럼 열려요</div><p>iPhone: 사파리 공유버튼(네모+화살표) → 홈 화면에 추가<br>Android: 크롬 메뉴 ⋮ → 홈 화면에 추가</p></div>';
    }
    $('app').innerHTML = h;

    if (isKakao) $('kakaoGo').addEventListener('click', function () { location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.origin + location.pathname); });
    if ($('installX')) $('installX').addEventListener('click', function () { store('installHintOff', '1'); $('installHint').style.display = 'none'; });
    $('whoBtn').addEventListener('click', function () { if (confirm('이름을 다시 고를까요?')) { store('famcode', null); init(); } });
    $('calBtn').addEventListener('click', openCalendar);
    var btns = $('app').querySelectorAll('.preset');
    for (var i = 0; i < btns.length; i++) (function (b) {
      b.addEventListener('click', function () {
        var it = items[+b.getAttribute('data-g')];
        if (it.type === 'group') openSheet({ name: it.name, variants: it.variants });
        else openSheet(it.p);
      });
    })(btns[i]);
    var obtns = $('app').querySelectorAll('.o-preset');
    for (var j = 0; j < obtns.length; j++) (function (b) { b.addEventListener('click', function () { openSheet(BOOT.others[+b.getAttribute('data-oi')]); }); })(obtns[j]);
    var ot = $('othersToggle');
    if (ot) ot.addEventListener('click', function () { othersOpen = !othersOpen; $('others').classList.toggle('on', othersOpen); });
    $('etcBtn').addEventListener('click', function () { openSheet(null); });
  }

  function openCalendar() {
    var t = setTimeout(function () { location.href = 'https://calendar.google.com/'; }, 1200);
    var clear = function () { clearTimeout(t); };
    window.addEventListener('pagehide', clear, { once: true });
    document.addEventListener('visibilitychange', function v() { if (document.hidden) { clear(); document.removeEventListener('visibilitychange', v); } });
    location.href = 'googlecalendar://';
  }

  // ── 타이머 ──
  function pad(n) { return (n < 10 ? '0' : '') + n; }
  function fmt(ms) { var s = Math.max(0, Math.floor(ms / 1000)); var m = Math.floor(s / 60); return pad(m) + ':' + pad(s % 60); }
  function human(ms) { var min = Math.round(ms / 60000); if (min < 60) return min + '분'; return Math.floor(min / 60) + '시간' + (min % 60 ? ' ' + (min % 60) + '분' : ''); }
  function segSum(type) {
    if (!sess) return 0;
    var t = 0;
    sess.segments.forEach(function (s) { if (s.type === type) t += s.end - s.start; });
    if (sess.state === type) t += Date.now() - sess.segStart;
    return t;
  }

  function fmtHMS(sec) {
    sec = Math.max(0, Math.floor(sec));
    var h = Math.floor(sec / 3600), m = Math.floor(sec % 3600 / 60), s = sec % 60;
    return h + ':' + pad(m) + ':' + pad(s);
  }
  function localPracticeSec(kind) {
    if (!sess) return 0;
    if (kind && sess.kind !== kind) return 0;
    var t = 0;
    sess.segments.forEach(function (s) { if (s.type === 'practice') t += s.end - s.start; });
    if (sess.state === 'practice') t += Date.now() - sess.segStart;
    return Math.floor(t / 1000);
  }
  function todaySec(kind) {
    var base = 0;
    if (BOOT && BOOT.today) base = (kind ? (BOOT.today.byKind[kind] || 0) : BOOT.today.totalMin) * 60;
    return base + localPracticeSec(kind || null);
  }
  function curSegSec() { return sess ? Math.floor((Date.now() - sess.segStart) / 1000) : 0; }
  function ddayLabel(m) {
    if (!m.dday) return '';
    var dd = Math.ceil((new Date(m.dday + 'T00:00:00') - new Date(todayStr() + 'T00:00:00')) / 86400000);
    var tag = dd > 0 ? 'D-' + dd : (dd === 0 ? 'D-DAY' : 'D+' + (-dd));
    return '<div class="dday-pill">' + esc(m.ddayName || '디데이') + ' ' + tag + '</div>';
  }

  function hmShort(sec) { var mn = Math.floor(Math.max(0, sec) / 60); return Math.floor(mn / 60) + 'H ' + (mn % 60) + 'M'; }
  function hrLabel(h) { h = ((h % 24) + 24) % 24; var x = h % 12; return x === 0 ? 12 : x; }
  function toHr(hm) { var p = String(hm).split(':'); return (+p[0]) + (+p[1]) / 60; }
  var TT_H0 = 7, TT_H1 = 24, TT_RH = 26;

  /** 연습 탭 = 열품타 메인: 날짜+총시간, 좌 과목·할일, 우 타임테이블 */
  function renderTimer() {
    if (sess && overlayOpen) { renderMeasure(); startTick(); return; }
    closeMeasure();
    var m = BOOT.member;
    var goal = m.goalMin || 0;
    var pct = goal ? Math.min(100, Math.round(todaySec(null) / (goal * 60) * 100)) : 0;
    var d = new Date();
    var dateStr = d.getFullYear() + '. ' + (d.getMonth() + 1) + '. ' + d.getDate() + ' (' + ['일', '월', '화', '수', '목', '금', '토'][d.getDay()] + ')';
    var todos = BOOT.todos || [];

    var h = '<div class="appbar" style="padding:2px 2px 6px"><span>' + ddayLabel(m) + '</span><div class="right">' +
      '<button class="iconbtn" id="calBtnT" title="가족 캘린더 열기">📅</button>' +
      '<button class="who" id="whoBtnT">' + esc(m.name) + '</button></div></div>';
    h += '<div class="yp-top"><span class="yp-date">' + dateStr + '</span><span class="yp-total" id="heroClock">' + hmShort(todaySec(null)) + '</span></div>';
    if (goal) h += '<div class="yp-goal" id="heroGoal">목표 ' + durLabel(goal) + ' · ' + pct + '%</div>';

    var left = '';
    (BOOT.subjects || []).forEach(function (s) {
      var k = s.name, c = s.color || '#9aa4b2';
      left += '<div class="yp-subj"><button class="yp-sh" data-start="' + esc(k) + '"><span class="yp-cbar" style="background:' + c + '"></span>' +
        '<span class="yp-nm">' + esc(k) + '</span><span class="yp-tm" data-kt="' + esc(k) + '" style="color:' + c + '">' + fmtHMS(todaySec(k)) + '</span></button>';
      todos.filter(function (t) { return t.kind === k; }).forEach(function (t) {
        left += '<div class="yp-todo' + (t.done ? ' done' : '') + '" data-td="' + esc(t.id) + '"><span class="yp-ring" style="border-color:' + c + ';background:' + (t.done ? c : 'transparent') + '">✓</span>' +
          '<span class="yp-tx">' + esc(t.text) + '</span>' + (t.repeat ? '<span class="yp-rep">매일</span>' : '') + '</div>';
      });
      left += '<div class="yp-div"></div></div>';
    });
    left += '<button class="yp-add" id="addTodo"><span class="p">+</span> 할 일 추가</button>';

    var rows = '';
    for (var hh = TT_H0; hh <= TT_H1; hh++) rows += '<div class="mtt-row"><span class="mtt-hr">' + hrLabel(hh) + '</span><span class="mtt-cell"></span></div>';
    var blocks = '';
    ((BOOT.today && BOOT.today.segs) || []).forEach(function (sg) {
      var s = toHr(sg.s), e = toHr(sg.e);
      if (e <= s) e = s + 1 / 60;
      if (e <= TT_H0 || s >= TT_H1) return;
      s = Math.max(s, TT_H0); e = Math.min(e, TT_H1);
      var c = sg.k === '휴식' ? '#3a3f4a' : subjColor(sg.k);
      blocks += '<div class="mtt-blk" style="top:' + ((s - TT_H0) * TT_RH) + 'px;height:' + Math.max(2, (e - s) * TT_RH - 1) + 'px;background:' + c + '"></div>';
    });
    h += '<div class="yp-body"><div class="yp-left">' + left + '</div>' +
      '<div class="yp-right"><div class="mtt">' + rows + '<div class="mtt-blocks">' + blocks + '</div></div></div></div>';

    $('app').innerHTML = h;
    $('calBtnT').addEventListener('click', openCalendar);
    $('whoBtnT').addEventListener('click', function () { if (confirm('이름을 다시 고를까요?')) { store('famcode', null); init(); } });
    var subs = $('app').querySelectorAll('.yp-sh');
    for (var i = 0; i < subs.length; i++) (function (b) {
      b.addEventListener('click', function () {
        if (sess) { overlayOpen = true; render(); return; }
        startSession(b.getAttribute('data-start'));
      });
    })(subs[i]);
    var tds = $('app').querySelectorAll('.yp-todo');
    for (var j = 0; j < tds.length; j++) (function (b) {
      b.addEventListener('click', function () { toggleTodo(b.getAttribute('data-td')); });
    })(tds[j]);
    $('addTodo').addEventListener('click', openTodoSheet);
    startTick();
  }

  function toggleTodo(id) {
    var t = (BOOT.todos || []).find(function (x) { return x.id === id; });
    if (!t) return;
    t.done = !t.done;
    if (document.body.classList.contains('measuring')) renderMeasure(); else renderTimer();
    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'todo', op: 'toggle', u: BOOT.member.code, id: id, done: t.done }) })
      .then(function (r) { return r.json(); })
      .then(function (res) { if (res && !res.error) { BOOT = res; saveBoot(res); } })
      .catch(function () {});
  }

  var todoKind = '', todoRep = false, todoNewColor = COLOR_PALETTE[0];
  function openTodoSheet() {
    var names = subjNames();
    todoKind = names[0] || ''; todoRep = false;
    renderTodoSheet(false);
    document.body.classList.add('todo-open');
    setTimeout(function () { if ($('ttext')) $('ttext').focus(); }, 250);
  }
  function renderTodoSheet(newMode) {
    var chips = (BOOT.subjects || []).map(function (s) {
      return '<button class="chip subj-chip' + (s.name === todoKind ? ' on' : '') + '" data-k="' + esc(s.name) + '">' + esc(s.name) + '</button>';
    }).join('') + '<button class="chip subj-chip add' + (newMode ? ' on' : '') + '" id="newSubjChip">+ 새 과목</button>';
    var body = '<div class="grip"></div><h2>할 일 추가</h2>' +
      '<div class="f-label">과목</div><div class="chips" id="tkchips">' + chips + '</div>';
    if (newMode) {
      body += '<div style="background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:12px 12px;margin-top:8px">' +
        '<input type="text" id="nsname" placeholder="새 과목 이름 (예: 재즈)" style="margin-bottom:10px">' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
        COLOR_PALETTE.map(function (c) { return '<button class="colordot' + (c === todoNewColor ? ' on' : '') + '" data-c="' + c + '" style="background:' + c + '"></button>'; }).join('') +
        '</div><button class="cta" id="nsAdd" style="margin-top:12px;background:var(--teal);color:#06231e">과목 추가</button></div>';
    } else {
      body += '<div class="f-label">내용</div><input type="text" id="ttext" placeholder="예: 크로매틱 스케일 10분">' +
        '<div class="rep-toggle"><span>매일 반복 <span style="color:var(--faint);font-weight:600">— 다음 날 자동으로 다시</span></span><span class="tg' + (todoRep ? ' on' : '') + '" id="ttg"></span></div>' +
        '<button class="cta" id="taddCta" style="margin-top:16px">추가</button>';
    }
    $('todoSheet').innerHTML = body;

    $('todoSheet').querySelectorAll('.subj-chip').forEach(function (b) {
      b.addEventListener('click', function () {
        if (b.id === 'newSubjChip') { renderTodoSheet(true); return; }
        todoKind = b.getAttribute('data-k'); renderTodoSheet(false);
      });
    });
    if (newMode) {
      $('todoSheet').querySelectorAll('.colordot').forEach(function (b) {
        b.addEventListener('click', function () { todoNewColor = b.getAttribute('data-c'); $('todoSheet').querySelectorAll('.colordot').forEach(function (x) { x.classList.toggle('on', x === b); }); });
      });
      $('nsAdd').addEventListener('click', function () {
        var nm = $('nsname').value.trim(); if (!nm) { $('nsname').focus(); return; }
        var btn = $('nsAdd'); btn.disabled = true; btn.textContent = '추가 중…';
        fetch(API, { method: 'POST', body: JSON.stringify({ action: 'subject', op: 'add', u: BOOT.member.code, name: nm, color: todoNewColor }) })
          .then(function (r) { return r.json(); })
          .then(function (res) { if (res && res.error) { showToast(res.error, true); btn.disabled = false; btn.textContent = '과목 추가'; return; } BOOT = res; saveBoot(res); todoKind = nm; renderTodoSheet(false); })
          .catch(function () { showToast('추가 실패 — 인터넷 확인', true); btn.disabled = false; btn.textContent = '과목 추가'; });
      });
      setTimeout(function () { if ($('nsname')) $('nsname').focus(); }, 100);
    } else {
      $('ttg').addEventListener('click', function () { todoRep = !todoRep; $('ttg').classList.toggle('on', todoRep); });
      $('taddCta').addEventListener('click', function () {
        var v = $('ttext').value.trim(); if (!v) { $('ttext').focus(); return; }
        if (!todoKind) { showToast('과목을 먼저 추가하세요', true); return; }
        var btn = $('taddCta'); btn.disabled = true; btn.textContent = '추가 중…';
        fetch(API, { method: 'POST', body: JSON.stringify({ action: 'todo', op: 'add', u: BOOT.member.code, kind: todoKind, text: v, repeat: todoRep }) })
          .then(function (r) { return r.json(); })
          .then(function (res) {
            if (res && res.error) { showToast(res.error, true); btn.disabled = false; btn.textContent = '추가'; return; }
            BOOT = res; saveBoot(res); document.body.classList.remove('todo-open'); renderTimer();
          })
          .catch(function () { showToast('추가 실패 — 인터넷 확인', true); btn.disabled = false; btn.textContent = '추가'; });
      });
    }
  }
  function closeTodoSheet() { document.body.classList.remove('todo-open'); }

  /** 측정 화면 — 검정 몰입 + 과목 과제 체크 + 화면 꺼짐 방지 */
  function renderMeasure() {
    var st = sess.state;
    var c = subjColor(sess.kind);
    var td = (BOOT.todos || []).filter(function (t) { return t.kind === sess.kind; });
    var tdHtml = td.length ? td.map(function (t) {
      return '<div class="yp-todo' + (t.done ? ' done' : '') + '" data-mtd="' + esc(t.id) + '"><span class="yp-ring" style="border-color:' + c + ';background:' + (t.done ? c : 'transparent') + '">✓</span><span class="yp-tx" style="color:' + (t.done ? 'var(--faint)' : '#cfd4dc') + '">' + esc(t.text) + '</span></div>';
    }).join('') : '<div style="color:var(--faint);font-size:13px;text-align:center">이 과목 과제가 없어요</div>';
    $('measure').innerHTML =
      '<button class="m-collapse" id="mCollapse">화면 접기 ⌄</button>' +
      '<div class="m-kind" style="color:' + c + '">🎸 ' + esc(sess.kind) + '</div>' +
      '<div class="m-pill ' + st + '">' + (st === 'practice' ? '연습 중' : '☕ 휴식 중') + '</div>' +
      '<div class="m-clock ' + st + '" id="mClock">' + fmtHMS(curSegSec()) + '</div>' +
      '<div class="m-today">오늘 총 <span id="mToday">' + fmtHMS(todaySec(null)) + '</span></div>' +
      '<div style="width:100%;max-width:320px;margin-top:24px">' + tdHtml + '</div>' +
      '<div class="m-btns">' +
      (st === 'practice'
        ? '<button class="tbtn rest" id="bRest">☕ 휴식하기</button>'
        : '<button class="tbtn resume" id="bResume">▶ 연습 다시 시작</button>') +
      '<button class="tbtn stop" id="bStop">■ 끝내기</button></div>';
    document.body.classList.add('measuring');
    $('mCollapse').addEventListener('click', function () { overlayOpen = false; closeMeasure(); render(); });
    if ($('bRest')) $('bRest').addEventListener('click', tBreak);
    if ($('bResume')) $('bResume').addEventListener('click', tResume);
    $('bStop').addEventListener('click', tFinish);
    var mtds = $('measure').querySelectorAll('.yp-todo');
    for (var i = 0; i < mtds.length; i++) (function (b) {
      b.addEventListener('click', function () { toggleTodo(b.getAttribute('data-mtd')); });
    })(mtds[i]);
    acquireWake();
  }
  function closeMeasure() { document.body.classList.remove('measuring'); releaseWake(); }

  function acquireWake() {
    if (!('wakeLock' in navigator)) return;
    navigator.wakeLock.request('screen').then(function (wl) { wakeLock = wl; }).catch(function () {});
  }
  function releaseWake() { if (wakeLock) { try { wakeLock.release(); } catch (e) {} wakeLock = null; } }
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden && document.body.classList.contains('measuring')) acquireWake();
  });

  function startTick() {
    if (tick) return;
    tick = setInterval(function () {
      if (document.body.classList.contains('measuring') && sess) {
        var c = $('mClock'); if (c) c.textContent = fmtHMS(curSegSec());
        var t = $('mToday'); if (t) t.textContent = fmtHMS(todaySec(null));
        return;
      }
      if (view !== 'timer') return;
      var hc = $('heroClock'); if (hc) hc.textContent = hmShort(todaySec(null));
      var m = BOOT.member;
      if (m && m.goalMin) {
        var g = $('heroGoal'); if (g) g.textContent = '목표 ' + durLabel(m.goalMin) + ' · ' + Math.min(100, Math.round(todaySec(null) / (m.goalMin * 60) * 100)) + '%';
      }
      if (sess) {
        var kt = document.querySelector('[data-kt="' + sess.kind + '"]');
        if (kt) kt.textContent = fmtHMS(todaySec(sess.kind));
      }
    }, 1000);
  }
  function stopTick() { if (tick) { clearInterval(tick); tick = null; } }

  function startSession(kind) {
    sess = { kind: kind, sessionStart: Date.now(), state: 'practice', segStart: Date.now(), segments: [] };
    overlayOpen = true;
    saveSess(); render();
  }
  function tBreak() { sess.segments.push({ type: 'practice', start: sess.segStart, end: Date.now() }); sess.state = 'break'; sess.segStart = Date.now(); saveSess(); renderMeasure(); }
  function tResume() { sess.segments.push({ type: 'break', start: sess.segStart, end: Date.now() }); sess.state = 'practice'; sess.segStart = Date.now(); saveSess(); renderMeasure(); }
  function tFinish() {
    if (!sess) return;
    var btn = $('bStop'); if (btn) { btn.disabled = true; btn.textContent = '저장 중…'; }
    sess.segments.push({ type: sess.state, start: sess.segStart, end: Date.now() });
    var payload = { action: 'session', u: BOOT.member.code, kind: sess.kind, segments: sess.segments };
    fetch(API, { method: 'POST', body: JSON.stringify(payload) })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res && res.error) { showToast(res.error, true); sess.segments.pop(); if (btn) { btn.disabled = false; btn.textContent = '■ 끝내기'; } return; }
        BOOT = res; saveBoot(res); store(SKEY, null);
        sess = null; overlayOpen = false;
        closeMeasure();
        showSummary(res.sessionSummary || {});
      })
      .catch(function () { showToast('저장 실패 — 인터넷 확인 후 다시 끝내기를 눌러주세요.', true); sess.segments.pop(); if (btn) { btn.disabled = false; btn.textContent = '■ 끝내기'; } });
  }

  function showSummary(sm) {
    var pMin = sm.practiceMin || 0, sets = sm.sets || 0, kind = sm.kind || '베이스';
    $('summary').innerHTML =
      '<div class="done-ic">🎉</div><h2>오늘 연습 끝!</h2><p class="ssub">실연습 ' + human(pMin * 60000) + ' · 잘했어요</p>' +
      '<div class="evt-card"><div class="cal-row">🎸 연습 기록 저장됐어요</div><div class="etitle">' + esc(kind) + ' 연습 · ' + human(pMin * 60000) + '</div>' +
      '<div class="edesc">' + sets + '세트 · 통계 탭에서 오늘 잔디와 시간을 볼 수 있어요</div></div>' +
      '<button class="close" id="sClose">확인</button>';
    document.body.classList.add('summary-on');
    $('sClose').addEventListener('click', function () { document.body.classList.remove('summary-on'); view = BOOT.member.practice ? 'timer' : 'home'; render(); });
  }

  // ── 통계 ──
  function loadStats() {
    statsLoading = true; renderStats();
    fetch(API + '?api=stats&u=' + encodeURIComponent(BOOT.member.code) + '&off=' + statsOff + '&t=' + encodeURIComponent(statsTarget))
      .then(function (r) { return r.json(); })
      .then(function (d) {
        statsData = d; statsLoading = false;
        statsSelDay = (d.offset === 0) ? new Date().getDate() : 0;
        renderStats();
      })
      .catch(function () { statsLoading = false; statsData = { error: '통계를 불러오지 못했어요.' }; renderStats(); });
  }
  function clockHM(min) { min = Math.max(0, Math.round(min)); return Math.floor(min / 60) + ':' + pad(min % 60); }
  function toMin_(hm) { var p = String(hm).split(':'); return (+p[0]) * 60 + (+p[1]); }
  function calLvl(min) { return min <= 0 ? 0 : min < 30 ? 1 : min < 60 ? 2 : min < 120 ? 3 : 4; }

  function renderStats() {
    renderTabs();
    var head = '<div class="appbar"><span class="t">통계</span><div class="right"><button class="iconbtn" id="calBtnS" title="가족 캘린더 열기">📅</button><span class="who">' + esc(BOOT.member.name) + '</span></div></div>';
    if (statsLoading || !statsData) { $('app').innerHTML = head + '<div class="loading"><div class="spin"></div>불러오는 중…</div>'; bindCalS(); return; }
    if (statsData.error) { $('app').innerHTML = head + '<div class="guide"><p>' + esc(statsData.error) + '</p></div>'; bindCalS(); return; }
    var d = statsData, h = head;
    if (d.targets && d.targets.length) {
      h += '<div class="chips" style="justify-content:center;margin-bottom:12px">' +
        d.targets.map(function (m) { return '<button class="chip st-t' + (m.code === d.target.code ? ' on' : '') + '" data-c="' + esc(m.code) + '">' + esc(m.name) + '</button>'; }).join('') + '</div>';
    }

    if (!d.target.practice) {
      h += monthNav_(d) + '<div class="stat-hero"><div class="sh-l">🗓 ' + esc(d.target.name) + ' · 일정</div><div class="sh-big">' + d.monthCount + '건</div><div class="sh-sub">이 달에 기록된 일정</div></div>' + eventsHtml_(d);
      $('app').innerHTML = h; bindStats_(d); return;
    }

    h += '<div class="yp-pills">' + ['일간', '주간', '월간', '추이'].map(function (p) { return '<button class="yp-pill' + (statsMode === p ? ' on' : '') + '" data-m="' + p + '">' + p + '</button>'; }).join('') + '</div>';
    if (statsMode === '일간') h += dailyHtml_(d);
    else if (statsMode === '주간') h += trendCard_('주간 연습시간', d.weeks, '주') + weekTotalCard_(d);
    else if (statsMode === '월간') h += trendCard_('월간 연습시간', d.months, '월');
    else h += trendCard_('일간 (이번 달)', (d.grass || []).map(function (m, i) { return { label: (i + 1) + '', min: m }; }), '') + trendCard_('주간 최근 12주', d.weeks, '') + trendCard_('월간 최근 12개월', d.months, '');

    $('app').innerHTML = h; bindStats_(d);
    $('app').querySelectorAll('.yp-pill').forEach(function (b) { b.addEventListener('click', function () { statsMode = b.getAttribute('data-m'); renderStats(); }); });
    $('app').querySelectorAll('.cal-cell[data-d]').forEach(function (b) { b.addEventListener('click', function () { statsSelDay = +b.getAttribute('data-d'); renderStats(); }); });
  }

  function monthNav_(d) { return '<div class="cal-nav"><button id="mPrev">‹</button><span class="mo">' + esc(d.label) + '</span><button id="mNext"' + (d.offset >= 0 ? ' disabled' : '') + '>›</button></div>'; }

  function dailyHtml_(d) {
    var ym = d.label.match(/(\d{4})년 (\d{1,2})월/), gy = +ym[1], gm = +ym[2] - 1;
    var firstDow = new Date(gy, gm, 1).getDay();
    // 달력 히트맵
    var cells = ['일', '월', '화', '수', '목', '금', '토'].map(function (s) { return '<div class="cal-dow">' + s + '</div>'; }).join('');
    for (var e = 0; e < firstDow; e++) cells += '<div class="cal-cell empty"></div>';
    (d.grass || []).forEach(function (min, idx) {
      var day = idx + 1, lv = calLvl(min), bg = CAL_COLS[lv];
      var ink = lv >= 3 ? '#0c0e12' : (lv >= 1 ? '#cfd4ff' : '#4b525f');
      cells += '<div class="cal-cell' + (statsSelDay === day ? ' sel' : '') + '" data-d="' + day + '" style="background:' + bg + ';color:' + ink + '"><span class="cd">' + day + '</span>' + (min > 0 ? '<span class="ct">' + clockHM(min) + '</span>' : '') + '</div>';
    });
    var leg = CAL_COLS.map(function (c) { return '<span class="lc" style="background:' + c + '"></span>'; }).join('');
    var monTot = (d.grass || []).reduce(function (a, m) { return a + m; }, 0);
    var h = '<div class="yp-scard">' + monTagNav_(d) + '<div class="cal-grid">' + cells + '</div><div class="cal-legend">적음 ' + leg + ' 많음</div><div class="cal-tot">' + (gm + 1) + '월 총 ' + clockHM(monTot) + '</div></div>';

    // 선택일 상세
    if (statsSelDay) {
      var segs = (d.daySegs && d.daySegs[String(statsSelDay)]) || [];
      var tot = (d.grass && d.grass[statsSelDay - 1]) || 0;
      var mx = 0, st = '—', en = '—';
      segs.forEach(function (sg) { var dur = toMin_(sg.e) - toMin_(sg.s); if (dur > mx) mx = dur; });
      if (segs.length) { st = segs[0].s; en = segs[segs.length - 1].e; }
      h += '<div class="yp-scard"><div class="dtl-h">' + (gm + 1) + '월 ' + statsSelDay + '일</div><div class="dtl-grid">' +
        '<div class="dtl"><div class="dl">총 연습시간</div><div class="dv">' + clockHM(tot) + '</div></div>' +
        '<div class="dtl"><div class="dl">최대 집중</div><div class="dv">' + clockHM(mx) + '</div></div>' +
        '<div class="dtl"><div class="dl">시작시간</div><div class="dv">' + st + '</div></div>' +
        '<div class="dtl"><div class="dl">종료시간</div><div class="dv">' + en + '</div></div></div></div>';
    }
    h += donutHtml_(d) + stackHtml_(d) + eventsHtml_(d);
    return h;
  }
  // 달력 카드 상단에 월 이동 넣기 (히트맵과 한 카드)
  function monTagNav_(d) { return '<div class="cal-nav"><button id="mPrev">‹</button><span class="mo">' + esc(d.label) + '</span><button id="mNext"' + (d.offset >= 0 ? ' disabled' : '') + '>›</button></div>'; }

  function donutHtml_(d) {
    if (!d.subjects) return '';
    var tot = d.subjects.reduce(function (a, s) { return a + s.practiceMin; }, 0);
    if (tot <= 0) return '';
    var acc = 0, stops = [];
    d.subjects.forEach(function (s) { if (s.practiceMin <= 0) return; var c = s.color || subjColor(s.name); stops.push(c + ' ' + (acc / tot * 100).toFixed(1) + '% ' + ((acc + s.practiceMin) / tot * 100).toFixed(1) + '%'); acc += s.practiceMin; });
    var leg = d.subjects.filter(function (s) { return s.practiceMin > 0; }).map(function (s) { var c = s.color || subjColor(s.name); return '<div class="lgi"><span class="dt" style="background:' + c + '"></span><span class="dn">' + esc(s.name) + '</span><span class="dv">' + clockHM(s.practiceMin) + ' · ' + Math.round(s.practiceMin / tot * 100) + '%</span></div>'; }).join('');
    return '<div class="yp-scard"><div class="scard-t">과목별 비율</div><div class="donut2"><div class="d" style="background:conic-gradient(' + stops.join(',') + ')"><div class="dh">' + clockHM(tot) + '</div></div><div class="lg">' + leg + '</div></div></div>';
  }

  function stackHtml_(d) {
    if (!d.week || !d.week.length) return '';
    var max = Math.max.apply(null, d.week.map(function (w) { return w.min; }).concat([1]));
    var cols = d.week.map(function (w) {
      var segs = subjNames().map(function (k) { var v = (w.byKind && w.byKind[k]) || 0; return v > 0 ? '<div class="stack-seg" style="height:' + (v / max * 110) + 'px;background:' + subjColor(k) + '"></div>' : ''; }).join('');
      return '<div class="stack-col"><div class="stack-bars">' + segs + '</div><span class="stack-lb">' + w.label.replace(/\(.*\)/, '') + '</span></div>';
    }).join('');
    return '<div class="yp-scard"><div class="scard-t">과목별 연습시간 (최근 7일)</div><div class="stack">' + cols + '</div></div>';
  }

  function trendCard_(title, arr, unit) {
    if (!arr || !arr.length) return '';
    var max = Math.max.apply(null, arr.map(function (x) { return x.min; }).concat([1]));
    var bars = arr.map(function (x) { return '<div class="trend-col"><div class="trend-bar" style="height:' + (x.min / max * 100) + 'px"></div><span class="trend-lb">' + esc(x.label) + '</span></div>'; }).join('');
    var mx = arr.reduce(function (a, x) { return Math.max(a, x.min); }, 0);
    return '<div class="yp-scard"><div class="scard-t">' + esc(title) + (mx ? ' · 최대 ' + clockHM(mx) : '') + '</div><div class="trend">' + bars + '</div></div>';
  }
  function weekTotalCard_(d) {
    var last = d.weeks && d.weeks.length ? d.weeks[d.weeks.length - 1] : null;
    if (!last) return '';
    return '<div class="yp-scard"><div class="dtl-h">이번 주</div><div class="dtl-grid"><div class="dtl"><div class="dl">총 연습</div><div class="dv">' + clockHM(last.min) + '</div></div><div class="dtl"><div class="dl">하루 평균</div><div class="dv">' + clockHM(Math.round(last.min / 7)) + '</div></div></div></div>';
  }

  function eventsHtml_(d) {
    if (!d.events || !d.events.length) return '';
    var evNoQ = d.events.filter(function (b) { return !b.quota; });
    var evMax = Math.max.apply(null, evNoQ.map(function (b) { return b.count; }).concat([1]));
    var h = '<div class="sec-label">' + (d.target.practice ? '그 외 일정' : esc(d.target.name) + ' · 일정') + '</div>';
    d.events.forEach(function (b, i) {
      var col = ['#e3a94f', '#8b96f2', '#4fc0af', '#9aa4b2'][i % 4], label, w, full = false;
      if (b.quota > 0) { full = b.count >= b.quota; label = (b.total ? '누적 ' : '') + b.count + '/' + b.quota + '회'; w = Math.min(100, Math.round(b.count / b.quota * 100)); if (full) col = '#4cc27e'; }
      else { label = b.count + '회'; w = Math.max(0, Math.round(b.count / evMax * 100)); }
      h += '<div class="bar-row"><div class="bl">' + esc(b.name) + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + w + '%;background:' + col + '"></div></div>' +
        '<div class="bar-val' + (full ? ' full' : '') + '">' + label + (full ? ' ✓' : '') + '</div></div>';
    });
    return h;
  }

  function bindStats_(d) {
    bindCalS();
    $('app').querySelectorAll('.st-t').forEach(function (c) { c.addEventListener('click', function () { statsTarget = c.getAttribute('data-c'); statsData = null; loadStats(); }); });
    var mp = $('mPrev'); if (mp) mp.addEventListener('click', function () { statsOff -= 1; statsData = null; loadStats(); });
    var mn = $('mNext'); if (mn && d.offset < 0) mn.addEventListener('click', function () { statsOff += 1; statsData = null; loadStats(); });
  }
  function bindCalS() { var b = $('calBtnS'); if (b) b.addEventListener('click', openCalendar); }

  // ── 예정 일정 등록 시트 (기존) ──
  function todayStr() { var d = new Date(); return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
  function nowRounded() { var d = new Date(); d.setMinutes(Math.ceil(d.getMinutes() / 10) * 10, 0, 0); return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
  function durLabel(m) { if (m < 60) return m + '분'; var h = Math.floor(m / 60), r = m % 60; return h + '시간' + (r ? ' ' + r + '분' : ''); }
  function addMin(t, m) { var hm = t.split(':'); var d = new Date(2026, 0, 1, +hm[0], +hm[1] + m); return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
  function diffMin(a, b) { var x = a.split(':'), y = b.split(':'); return (+y[0] * 60 + +y[1]) - (+x[0] * 60 + +x[1]); }

  function applyVariant(v) {
    $('shTime').value = (v && v.p.defStart) || nowRounded();
    curDur = (v && v.p.defDur) || 60; customEnd = false; $('endRow').style.display = 'none';
    renderChips(); updateEnd();
  }
  function openSheet(preset) {
    cur = preset; var custom = !preset; var isGroup = !!(preset && preset.variants);
    $('shTitle').textContent = custom ? '기타 일정' : preset.name;
    $('shSub').textContent = custom ? '이름을 적고 시간을 확인하세요'
      : (preset.whoName ? preset.whoName + ' 일정으로 등록돼요'
        : (isGroup ? '어느 날인지 고르면 시간이 채워져요' : '시간만 확인하고 등록을 누르세요'));
    $('shCustom').style.display = custom ? 'block' : 'none';
    $('shCustom').value = '';
    $('shDate').value = todayStr();
    if (isGroup) {
      $('varLabel').style.display = ''; $('varChips').style.display = '';
      var vh = '';
      preset.variants.forEach(function (v, k) { vh += '<button class="chip' + (k === 0 ? ' on' : '') + '" data-v="' + k + '">' + esc(v.variant) + '</button>'; });
      $('varChips').innerHTML = vh;
      var vcs = document.querySelectorAll('#varChips .chip');
      for (var k = 0; k < vcs.length; k++) (function (c) {
        c.addEventListener('click', function () {
          var vi = +c.getAttribute('data-v');
          for (var j = 0; j < vcs.length; j++) vcs[j].classList.toggle('on', j === vi);
          applyVariant(preset.variants[vi]);
        });
      })(vcs[k]);
      applyVariant(preset.variants[0]);
    } else {
      $('varLabel').style.display = 'none'; $('varChips').style.display = 'none';
      $('shTime').value = (preset && preset.defStart) || nowRounded();
      curDur = (preset && preset.defDur) || 60; customEnd = false; $('endRow').style.display = 'none';
      renderChips(); updateEnd();
    }
    document.body.classList.add('open');
    if (custom) setTimeout(function () { $('shCustom').focus(); }, 250);
  }
  function closeSheet() { document.body.classList.remove('open'); }
  function renderChips() {
    var list = DURS.indexOf(curDur) >= 0 || customEnd ? DURS : DURS.concat([curDur]).sort(function (a, b) { return a - b; });
    var h = '';
    list.forEach(function (m) { h += '<button class="chip' + (!customEnd && m === curDur ? ' on' : '') + '" data-m="' + m + '">' + durLabel(m) + '</button>'; });
    h += '<button class="chip' + (customEnd ? ' on' : '') + '" data-m="custom">직접…</button>';
    $('durChips').innerHTML = h;
    var chips = document.querySelectorAll('#durChips .chip');
    for (var i = 0; i < chips.length; i++) (function (c) {
      c.addEventListener('click', function () {
        var m = c.getAttribute('data-m');
        if (m === 'custom') { customEnd = true; $('endRow').style.display = 'flex'; $('shEnd').value = addMin($('shTime').value || '12:00', curDur); renderChips(); updateEnd(); $('shEnd').focus(); }
        else { customEnd = false; $('endRow').style.display = 'none'; curDur = +m; renderChips(); updateEnd(); }
      });
    })(chips[i]);
  }
  function updateEnd() {
    var t = $('shTime').value || '12:00';
    if (customEnd) {
      var e = $('shEnd').value; var m = e ? diffMin(t, e) : 0;
      if (m > 0) { curDur = m; $('endline').innerHTML = '끝나는 시간 <b>' + e + '</b> · ' + durLabel(m); }
      else $('endline').innerHTML = '<b style="color:var(--danger)">끝나는 시간을 시작보다 뒤로 정해주세요</b>';
      return;
    }
    $('endline').innerHTML = '끝나는 시간 <b>' + addMin(t, curDur) + '</b> · ' + durLabel(curDur);
  }
  function showToast(msg, isErr) { var toast = $('toast'); toast.textContent = msg; toast.className = 'toast show' + (isErr ? ' err' : ''); setTimeout(function () { toast.className = 'toast' + (isErr ? ' err' : ''); }, 2800); }

  $('shTime').addEventListener('input', updateEnd);
  $('shEnd').addEventListener('input', updateEnd);
  $('backdrop').addEventListener('click', function () { closeSheet(); closeTodoSheet(); });
  $('ctaBtn').addEventListener('click', function () {
    if (sending) return;
    var title = cur ? cur.name : $('shCustom').value.trim();
    if (!title) { $('shCustom').focus(); return; }
    var d = $('shDate').value.split('-'), t = $('shTime').value.split(':');
    if (d.length !== 3 || t.length !== 2) { showToast('날짜와 시간을 확인해주세요', true); return; }
    if (customEnd && (!$('shEnd').value || diffMin($('shTime').value, $('shEnd').value) <= 0)) { showToast('끝나는 시간을 시작보다 뒤로 정해주세요', true); return; }
    sending = true; var btn = $('ctaBtn'); btn.disabled = true; btn.textContent = '등록 중…';
    var payload = { action: 'register', u: BOOT.member.code, who: (cur && cur.who) || BOOT.member.code, title: title, durationMin: curDur, y: +d[0], mo: +d[1], d: +d[2], h: +t[0], mi: +t[1], memo: '' };
    var subjectName = (cur && cur.whoName) || BOOT.member.name, startLabel = $('shTime').value;
    fetch(API, { method: 'POST', body: JSON.stringify(payload) })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        sending = false; btn.disabled = false; btn.textContent = '가족 캘린더에 등록';
        if (res && res.error) { showToast(res.error, true); return; }
        BOOT = res; saveBoot(res); render(); closeSheet();
        showToast('등록 완료 — ' + title + ' (' + subjectName + ') ' + startLabel + ', 가족 캘린더에 올라갔어요');
      })
      .catch(function () { sending = false; btn.disabled = false; btn.textContent = '가족 캘린더에 등록'; showToast('등록에 실패했어요. 인터넷 연결을 확인하고 다시 시도해주세요.', true); });
  });

  if ('serviceWorker' in navigator) { try { navigator.serviceWorker.register('sw.js'); } catch (e) {} }
  init();
</script>
</body>
</html>
